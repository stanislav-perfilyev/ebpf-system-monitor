version: "3.8"

services:
  prometheus:
    image: prom/prometheus:v2.51.0
    container_name: ebpf_prometheus
    ports:
      - "9091:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=7d"
    restart: unless-stopped
    network_mode: host

  grafana:
    image: grafana/grafana:10.4.2
    container_name: ebpf_grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH=/etc/grafana/dashboards/ebpf.json
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana_datasource.yml:/etc/grafana/provisioning/datasources/prometheus.yml:ro
      - ./grafana_dashboard.yml:/etc/grafana/provisioning/dashboards/ebpf.yml:ro
      - ./dashboard.json:/etc/grafana/dashboards/ebpf.json:ro
    depends_on:
      - prometheus
    restart: unless-stopped
    network_mode: host

volumes:
  prometheus_data:
  grafana_data:
