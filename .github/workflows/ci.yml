name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            clang llvm libbpf-dev libelf-dev \
            cmake build-essential libgtest-dev
          # Always use pre-built kernel-independent bpftool
          curl -fsSL https://github.com/libbpf/bpftool/releases/download/v7.4.0/bpftool-v7.4.0-amd64.tar.gz \
            | tar -xz bpftool
          sudo install -m 755 bpftool /usr/local/bin/bpftool
          bpftool version

      - name: Generate vmlinux.h
        run: |
          mkdir -p build
          if [ -f /sys/kernel/btf/vmlinux ]; then
            sudo bpftool btf dump file /sys/kernel/btf/vmlinux format c > build/vmlinux.h
            wc -l build/vmlinux.h
          else
            echo "vmlinux BTF not available — creating empty placeholder"
            touch build/vmlinux.h
          fi

      - name: Configure CMake
        run: |
          cmake -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build userspace
        run: cmake --build build --target ebpf-monitor -j$(nproc)

      - name: Compile BPF programs (optional)
        run: cmake --build build --target bpf_programs -j$(nproc) || echo "BPF compilation unavailable (no BTF/kernel headers) — skipped"

      - name: Build tests
        run: |
          cmake --build build --target test_ebpf_monitor -j$(nproc)
          cmake --build build --target test_dpdk_sim     -j$(nproc)
          cmake --build build --target test_http         -j$(nproc)

      - name: Run unit tests
        run: |
          cd build
          ctest --output-on-failure
